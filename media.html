<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="New Ashbal Academy — معرض الوسائط: فيديوهات تدريب وصور مباريات." />
    <title>معرض الوسائط | New Ashbal Academy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              naa: {
                ink: "#0B0F14",
                blue: "#1e3a8a",
                sky: "#3b82f6",
                green: "#1B5E20",
                maroon: "#7A0C12",
                gold: "#d4af37",
              },
            },
            boxShadow: {
              soft: "0 16px 50px rgba(0,0,0,0.35)",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
      body { font-family: "Cairo", sans-serif; }
      .focus-ring:focus-visible { outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.35); }
    </style>
  </head>

  <body class="min-h-screen bg-naa-ink text-white">
    <header class="sticky top-0 z-50 border-b border-white/10 bg-naa-ink/80 backdrop-blur">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3 sm:px-6 lg:px-8">
        
        <a href="index.html" class="group inline-flex items-center gap-3 rounded-2xl px-2 py-2 hover:bg-white/5 focus-ring">
          <span class="grid h-11 w-11 place-items-center overflow-hidden rounded-2xl border border-white/10 bg-black/30 shadow-soft">
            <img src="assets/image_1.png" alt="Logo" class="h-full w-full object-contain p-1" />
          </span>
          <span class="leading-tight hidden sm:block">
            <span class="block text-sm font-extrabold">أكاديمية أشبال الجديدة</span>
            <span class="block text-xs text-white/70">Media Gallery</span>
          </span>
        </a>

        <nav class="flex items-center gap-2">
          <a href="index.html" class="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs sm:text-sm font-extrabold hover:bg-white/10 hover:border-naa-gold transition-all">
            <i class="fa-solid fa-house text-naa-gold"></i>
            <span class="hidden md:inline">الرئيسية</span>
          </a>
          <a href="media.html" class="inline-flex items-center gap-2 rounded-xl border border-naa-sky bg-white/10 px-3 py-2 text-xs sm:text-sm font-extrabold shadow-soft">
            <i class="fa-solid fa-photo-film text-naa-sky"></i>
            <span class="hidden md:inline">المعرض</span>
          </a>
          <a href="register.html" class="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs sm:text-sm font-extrabold hover:bg-white/10 hover:border-naa-green transition-all">
            <i class="fa-solid fa-user-gear text-naa-green"></i>
            <span class="hidden md:inline">التسجيل</span>
          </a>
        </nav>
      </div>
    </header>

    <main>
      <section class="border-b border-white/10 bg-gradient-to-b from-black to-naa-blue/20 py-12">
        <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
          <header>
            <h1 class="text-4xl font-extrabold">Media Gallery</h1>
            <p class="mt-2 text-white/70">مركز فيديوهات تدريب + معرض صور بتأثير تكبير احترافي.</p>
          </header>

          <div class="mt-8">
            <h2 class="text-2xl font-extrabold flex items-center gap-2">
              <i class="fa-solid fa-circle-play text-naa-sky"></i>
              Video Hub
            </h2>
            <div id="videosGrid" class="mt-6 grid gap-6 lg:grid-cols-3"></div>
            <p id="videosEmpty" class="mt-4 hidden text-sm text-white/65 italic">لا توجد فيديوهات مرفوعة حالياً.</p>
          </div>
        </div>
      </section>

      <section class="py-12">
        <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
          <h2 class="text-2xl font-extrabold flex items-center gap-2">
            <i class="fa-solid fa-camera text-naa-gold"></i>
            Photo Gallery
          </h2>
          <div id="photosGrid" class="mt-6 grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4"></div>
          <p id="photosEmpty" class="mt-4 hidden text-sm text-white/65 italic">لا توجد صور مرفوعة حالياً.</p>
        </div>
      </section>

      <footer class="border-t border-white/10 bg-black/40 py-6 text-center text-xs text-white/60">
        <p>© <span id="year"></span> New Ashbal Academy | Sporty Gallery</p>
      </footer>
    </main>

    <script>
      const LS_KEYS = { mediaPhotos: "naa_media_photos_v1", mediaVideos: "naa_media_videos_v1" };

      function lsGet(key, fallback) {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      }

      function renderVideos() {
        const grid = document.getElementById("videosGrid");
        const list = lsGet(LS_KEYS.mediaVideos, []);
        grid.innerHTML = "";
        if (!list.length) document.getElementById("videosEmpty").classList.remove("hidden");
        else {
          document.getElementById("videosEmpty").classList.add("hidden");
          list.forEach(v => {
            grid.innerHTML += `
              <article class="overflow-hidden rounded-3xl border border-white/10 bg-white/[0.04]">
                <video class="aspect-video w-full object-cover" controls src="${v.dataUrl}"></video>
                <div class="p-4"><p class="text-sm font-extrabold">${v.title || "فيديو تدريبي"}</p></div>
              </article>`;
          });
        }
      }

      function renderPhotos() {
        const grid = document.getElementById("photosGrid");
        const list = lsGet(LS_KEYS.mediaPhotos, []);
        grid.innerHTML = "";
        if (!list.length) document.getElementById("photosEmpty").classList.remove("hidden");
        else {
          document.getElementById("photosEmpty").classList.add("hidden");
          list.forEach(p => {
            grid.innerHTML += `
              <div class="group relative aspect-square overflow-hidden rounded-3xl border border-white/10">
                <img src="${p.dataUrl}" class="h-full w-full object-cover transition duration-300 group-hover:scale-110" />
                <span class="absolute bottom-2 right-2 bg-black/60 px-2 py-1 rounded-lg text-[10px]">${p.title || "صورة"}</span>
              </div>`;
          });
        }
      }

      document.getElementById("year").textContent = new Date().getFullYear();
      renderVideos();
      renderPhotos();
      window.addEventListener("focus", () => { renderVideos(); renderPhotos(); });
    </script>
  </body>
</html>
